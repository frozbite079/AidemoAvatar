<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}?v=20260413a" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  </head>
  <body>

    <!-- ══════════ GLASSMORPHIC TOP BAR ══════════ -->
    <header class="topbar">
      <div class="brand-lockup">
        <div class="brand-mark">M</div>
        <span class="brand-title">مساعد</span>
      </div>
      <nav class="topnav">
        <button class="nav-icon" aria-label="Profile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21c0-4.4-3.6-8-8-8s-8 3.6-8 8"/></svg>
        </button>
        <button class="nav-icon" aria-label="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </nav>
    </header>

    <!-- ══════════ MAIN IMMERSIVE LAYOUT ══════════ -->
    <main class="main-immersive">

      <!-- Right-side floating action icons -->
      <aside class="side-actions">
        <button class="side-action-btn" id="toggleMic" type="button" aria-label="Microphone">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button class="side-action-btn" id="speakResponse" type="button" disabled aria-label="Speak last response">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <button class="side-action-btn" id="startAvatarSession" type="button" aria-label="Start Avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="side-action-btn" id="stopAvatarSession" type="button" disabled aria-label="Stop Avatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </aside>

      <!-- ──── CENTER STAGE: AVATAR ──── -->
      <section class="avatar-stage" id="avatarStage">
        <div class="avatar-backdrop"></div>
        <div class="avatar-noise"></div>
        <div class="avatar-halo"></div>
        <div id="remoteVideo" class="remote-video-slot"></div>
        <div id="subtitles" class="avatar-subtitles" hidden></div>
        <div class="avatar-placeholder" id="avatarPlaceholder">
          <div class="avatar-core">
            <div class="avatar-face">
              <span></span>
              <span></span>
            </div>
          </div>
        </div>
        <button id="playVideoButton" class="play-video-btn" style="display:none;" onclick="playAvatarVideo()">
          ▶ Click to Start Video
        </button>
        <canvas id="canvas" width="1920" height="1080" style="background-color:transparent;display:none;"></canvas>
        <canvas id="tmpCanvas" width="1920" height="1080" style="display:none;"></canvas>

        <!-- Floating STOP button on avatar -->
        <div class="avatar-stop-overlay" id="avatarStopOverlay" style="display:none;">
          <button class="stop-pill" id="stopPill" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            STOP
          </button>
        </div>
      </section>

      <!-- ──── STATUS BADGE ──── -->
      <div class="status-row">
        <div class="status-badge" id="sdkStatus">تم ربط الأفاتار بنجاح</div>
      </div>

      <!-- ──── AI RESPONSE BUBBLE ──── -->
      <div class="response-area">
        <div class="chat-thread" id="chatThread"></div>
      </div>

      <!-- ──── LISTENING BAR ──── -->
      <div class="listening-bar" id="listeningBar" style="display:none;">
        <span class="pulse-dot"></span>
        <span>جاري الاستماع إليك... يرجى التحدث بوضوح لضمان دقة الاستجابة.</span>
      </div>

      <!-- Speech card (hidden but needed by script.js) -->
      <div class="speech-card is-hidden-assist" id="speechCard">
        <p class="speech-label">الترحيب</p>
        <p class="speech-text">أهلاً بك، أنا مساعد الذكي. ارفع ملفك واسألني ما تريد.</p>
      </div>
      <button class="btn btn-outline is-hidden-assist" id="speakCustomText" type="button" disabled>نطق نص مخصص</button>

    </main>

    <!-- ══════════ BOTTOM INPUT BAR ══════════ -->
    <footer class="input-bar">
      <!-- Upload FAB -->
      <button class="upload-fab" id="uploadTrigger" type="button" aria-label="Upload Doc / TXT">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
        <span class="upload-label">Upload Doc / TXT</span>
      </button>

      <!-- Upload status -->
      <div class="upload-result" id="uploadResult">
        <span class="upload-dot">●</span>
        <p class="upload-state">لم يتم رفع أي مستند بعد.</p>
      </div>

      <!-- Prompt chips -->
      <div class="prompt-row">
        <button class="prompt-chip" type="button">تحليل المخاطر</button>
        <button class="prompt-chip" type="button">مقارنة مع الربع السابق</button>
        <button class="prompt-chip" type="button">تحميل التقرير الكامل</button>
      </div>

      <!-- Chat composer form -->
      <form class="chat-composer" id="chatComposer">
        <button class="send-btn" type="submit" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
        <input
          id="chatInput"
          type="text"
          placeholder="Type your message..."
          aria-label="Question input"
          autocomplete="off"
        />
        <button class="mic-inline" type="button" id="micInline" aria-label="Voice input">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        </button>
        <input id="fileInput" type="file" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx" hidden />
      </form>
    </footer>

    <!-- ══════════ EMAIL MODAL ══════════ -->
    <div class="modal-overlay is-hidden" id="emailModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>إرسال المعلومات عبر البريد الإلكتروني</h3>
          <button class="modal-close" id="emailModalClose" type="button" aria-label="Close email modal">×</button>
        </div>
        <div class="modal-body">
          <form id="emailForm">
            <div class="field-stack">
              <label for="recipientEmail">بريدك الإلكتروني</label>
              <input type="email" id="recipientEmail" placeholder="name@example.com" required />
            </div>
            <div class="field-stack">
              <label for="emailSubject">الموضوع (اختياري)</label>
              <input type="text" id="emailSubject" placeholder="معلومات من مساعد الذكي" />
            </div>
            <div class="field-stack">
              <label for="emailContent">المحتوى المراد إرساله</label>
              <textarea id="emailContent" rows="6" placeholder="اكتب المحتوى الذي تريد إرساله..." required></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" id="cancelEmail" type="button">إلغاء</button>
          <button class="btn btn-primary" id="sendEmail" type="button">إرسال البريد</button>
        </div>
      </div>
    </div>

    <!-- ══════════ HIDDEN CONFIG INPUTS (required by script.js) ══════════ -->
    <input id="avatarCharacter" type="hidden" value="harry" />
    <input id="avatarStyle" type="hidden" value="business" />
    <input id="ttsVoice" type="hidden" value="ar-SA-HamedNeural" />
    <input id="backgroundColor" type="hidden" value="#FFFFFFFF" />
    <input type="checkbox" id="customizedAvatar" style="display:none;" />
    <input type="checkbox" id="transparentBackground" style="display:none;" />
    <input type="checkbox" id="videoCrop" style="display:none;" />
    <input type="checkbox" id="showSubtitles" style="display:none;" />
    <select id="languageSelect" style="display:none;">
      <option value="ar-SA" selected>العربية (السعودية)</option>
      <option value="en-US">English</option>
    </select>
    <textarea id="customSpeechText" style="display:none;"></textarea>

    <script>
      window.APP_CONFIG = {{ app_config | tojson }};
    </script>
    <script src="{{ url_for('static', path='script.js') }}?v=20260415f"></script>
  </body>
</html>
